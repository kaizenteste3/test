
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="out.css">
  <title>予算管理アプリ</title>
</head>
<body class="bg-slate-100 min-h-screen">
  <div class="container mx-auto px-4 py-8 max-w-4xl">
    <h1 class="text-3xl font-bold text-center text-slate-800 mb-8">予算管理アプリ2</h1>
    
    <!-- 予算サマリー2 -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
      <div class="bg-green-500 text-white p-6 rounded-lg shadow-md">
        <h2 class="text-lg font-semibold">総収入</h2>
        <p class="text-2xl font-bold" id="total-income">¥0</p>
      </div>
      <div class="bg-red-500 text-white p-6 rounded-lg shadow-md">
        <h2 class="text-lg font-semibold">総支出</h2>
        <p class="text-2xl font-bold" id="total-expense">¥0</p>
      </div>
      <div class="bg-blue-500 text-white p-6 rounded-lg shadow-md">
        <h2 class="text-lg font-semibold">残高</h2>
        <p class="text-2xl font-bold" id="balance">¥0</p>
      </div>
    </div>

    <!-- 入力フォーム -->
    <div class="bg-white p-6 rounded-lg shadow-md mb-8">
      <h2 class="text-xl font-semibold mb-4">新しい取引を追加</h2>
      <form id="transaction-form">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
          <input type="text" id="description" placeholder="説明" required 
                 class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
          <input type="number" id="amount" placeholder="金額" required 
                 class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
          <select id="type" required 
                  class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">種類を選択</option>
            <option value="income">収入</option>
            <option value="expense">支出</option>
          </select>
          <button type="submit" 
                  class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded-md transition duration-200">
            追加
          </button>
        </div>
      </form>
    </div>

    <!-- 取引履歴 -->
    <div class="bg-white p-6 rounded-lg shadow-md">
      <h2 class="text-xl font-semibold mb-4">取引履歴</h2>
      <div id="transactions-list" class="space-y-2">
        <p class="text-gray-500 text-center">取引がありません</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
